spring:
  application:
    name: matcha-company-service
  datasource:
    url: ${DATASOURCE_URL:jdbc:postgresql://localhost:5432/matcha_company}
    username: ${DATASOURCE_USERNAME:matcha}
    password: ${DATASOURCE_PASSWORD:matcha}
    hikari:
      maximum-pool-size: 10
      minimum-idle: 2
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
  flyway:
    enabled: true
    locations: classpath:db/migration
  rabbitmq:
    host: ${RABBITMQ_HOST:localhost}
    port: ${RABBITMQ_PORT:5672}
    username: ${RABBITMQ_USERNAME:matcha}
    password: ${RABBITMQ_PASSWORD:matcha}

server:
  port: 8084

management:
  endpoints:
    web:
      exposure:
        include: health, prometheus
  metrics:
    export:
      prometheus:
        enabled: true

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html

rsa:
  public-key: ${RSA_PUBLIC_KEY}

services:
  user:
    url: ${SERVICES_USER_URL:http://localhost:8083}
    timeout-ms: ${SERVICES_USER_TIMEOUT_MS:5000}
